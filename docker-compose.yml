services:
  hellpot:
    build: .
    container_name: hellpot
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      # Bind mounts (recommended — easy to edit config.toml)
      - ./config:/config
      - ./logs:/logs

    # Uncomment the lines below if you prefer named volumes instead
    # volumes:
    #   - hellpot_config:/config
    #   - hellpot_logs:/logs

# volumes:
#   hellpot_config:
#   hellpot_logs:
